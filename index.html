<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조랄두껍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
            color: #fff;
        }

        /* UI */
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            pointer-events: none;
        }

        #score {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
        }

        #lives {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 10px;
        }

        .heart {
            font-size: 28px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
        }

        .heart.lost {
            opacity: 0.2;
        }

        /* 메인 메뉴 */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #main-menu h1 {
            font-size: 80px;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        #main-menu h2 {
            font-size: 30px;
            margin-bottom: 40px;
            color: #ccc;
            text-align: center;
        }

        .menu-btn {
            padding: 15px 60px;
            font-size: 24px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s;
            margin: 10px 0;
            width: 300px;
            text-align: center;
        }

        .menu-btn:hover {
            background: #ffff00;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 0, 0.5);
        }

        /* 도감 모달 - z-index를 가장 높게 설정 */
        #collection-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000; /* 가장 높은 z-index로 설정 */
        }

        #collection-modal.active {
            display: flex;
        }

        #collection-content {
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            background: #111;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
            border: 3px solid #333;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        #collection-content h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .collection-item {
            background: #222;
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #444;
            transition: all 0.3s;
        }

        .collection-item.discovered {
            border-color: var(--item-color);
            box-shadow: 0 0 20px var(--item-color);
        }

        .collection-item.locked {
            opacity: 0.3;
            background: #111;
        }

        .collection-item h3 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .collection-item p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .collection-stats {
            color: #888;
            font-size: 12px;
        }

        .close-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 40px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 보스 HP 바 */
        #boss-hp-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            display: none;
            z-index: 2000;
        }

        #boss-hp-container.active {
            display: block;
        }

        #boss-name {
            color: #ff00ff;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff00ff;
        }

        #boss-hp-bar {
            width: 100%;
            height: 30px;
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        #boss-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #ff66ff);
            transition: width 0.3s;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* 개구리 */
        .frog {
            position: absolute;
            cursor: pointer;
            transition: filter 0.1s;
            will-change: transform;
        }

        .frog:hover {
            filter: brightness(1.4) drop-shadow(0 0 30px rgba(255, 255, 255, 0.9));
        }

        .frog.shiny {
            filter: brightness(1.5) saturate(1.4) drop-shadow(0 0 30px rgba(255, 230, 102, 0.8));
            animation: shinyPulse 1.2s infinite;
        }

        .frog.shiny::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 60%);
            opacity: 0.8;
            pointer-events: none;
            animation: sparkle 1.8s infinite;
        }

        .frog video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }

        .frog.shiny video {
            border-color: #ffeb3b !important;
            box-shadow: 0 0 35px rgba(255, 235, 59, 0.6);
        }

        .frog.boss video {
            border: 5px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 1);
            animation: bossPulse 1s infinite;
        }

        @keyframes bossPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.5); }
        }

        @keyframes shinyPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.4; transform: rotate(0deg) scale(1); }
            50% { opacity: 1; transform: rotate(45deg) scale(1.1); }
        }

        /* 파티클 */
        .blood-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #ff0000;
        }

        /* 점수 팝업 */
        .score-popup {
            position: absolute;
            color: #fff;
            font-size: 40px;
            font-weight: 900;
            pointer-events: none;
            z-index: 6000;
            text-shadow: 0 0 20px currentColor;
            animation: scoreFloat 0.8s ease-out forwards;
        }

        @keyframes scoreFloat {
            to {
                transform: translateY(-100px);
                opacity: 0;
            }
        }

        /* 화면 흔들림 */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            10% { transform: translate(-20px, 10px) rotate(-2deg); }
            20% { transform: translate(20px, -10px) rotate(2deg); }
            30% { transform: translate(-15px, -15px) rotate(-1deg); }
            40% { transform: translate(15px, 15px) rotate(1deg); }
            50% { transform: translate(-20px, 10px) rotate(-2deg); }
            60% { transform: translate(20px, -10px) rotate(2deg); }
            70% { transform: translate(-15px, -15px) rotate(-1deg); }
            80% { transform: translate(15px, 15px) rotate(1deg); }
            90% { transform: translate(-10px, 10px) rotate(-1deg); }
        }

        body.shake {
            animation: screenShake 0.5s;
        }

        /* 플래시 (피격시) */
        #damage-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            display: none;
            z-index: 8000;
            pointer-events: none;
            animation: damageFlash 0.3s;
        }

        #damage-flash.active {
            display: block;
        }

        @keyframes damageFlash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }

        /* 게임오버 */
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 15000;
            pointer-events: none;
        }

        #game-over.active {
            display: flex;
            pointer-events: auto;
        }

        #game-over h1 {
            color: #ff3333;
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 51, 51, 0.8);
        }

        #final-stats {
            color: #fff;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .game-over-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            margin: 10px;
        }

        .game-over-btn:hover {
            background: #ffff00;
            transform: translateY(-3px);
        }

        /* 콤보 표시 */
        #combo-display {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 24px;
            color: #ffff00;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        #combo-display.active {
            opacity: 1;
        }

        /* 점수 로그 */
        #score-log-panel {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 280px;
            max-height: 45vh;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 18px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1400;
            backdrop-filter: blur(6px);
            pointer-events: auto;
        }

        #score-log-panel h3 {
            font-size: 18px;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        #score-log {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        #score-log::-webkit-scrollbar {
            width: 6px;
        }

        #score-log::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 6px;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.06);
            border-left: 3px solid rgba(255, 255, 255, 0.2);
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.4;
            color: #eee;
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.4);
        }

        .log-entry.highlight {
            border-left-color: #ffeb3b;
            box-shadow: 0 0 18px rgba(255, 235, 59, 0.35);
            color: #fffbcc;
        }

        .log-entry .timestamp {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2px;
        }

        /* 특수 효과 */
        .special-effect {
            position: absolute;
            pointer-events: none;
            z-index: 5000;
        }

        /* 난이도 표시 */
        #difficulty-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        /* 게임 일시정지 */
        #pause-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            z-index: 2000;
            transition: all 0.3s;
        }

        #pause-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 일시정지 화면 */
        #pause-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 19000;
        }

        #pause-screen.active {
            display: flex;
        }

        #pause-screen h1 {
            color: #fff;
            font-size: 64px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .pause-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            margin: 10px;
        }

        .pause-btn:hover {
            background: #ffff00;
            transform: translateY(-3px);
        }

        /* 두꺼비 특수 효과 애니메이션 */
        @keyframes hypnotize {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        @keyframes teleport {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes dance {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        @keyframes flex {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
        <div id="lives">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>
    </div>

    <div id="difficulty-display">난이도: 초급</div>

    <div id="boss-hp-container">
        <div id="boss-name">🌟 여유껍 🌟</div>
        <div id="boss-hp-bar">
            <div id="boss-hp-fill"></div>
        </div>
    </div>

    <div id="damage-flash"></div>

    <div id="combo-display">콤보 x<span id="combo-count">0</span></div>

    <div id="score-log-panel">
        <h3>점수 로그</h3>
        <div id="score-log"></div>
    </div>

    <button id="pause-btn">일시정지</button>

    <div id="pause-screen">
        <h1>일시정지</h1>
        <button class="pause-btn" id="resume-btn">계속</button>
        <button class="pause-btn" id="pause-collection-btn">도감</button>
        <button class="pause-btn" id="pause-main-menu-btn">메뉴</button>
    </div>

    <div id="main-menu">
        <h1>조랄두껍</h1>
        <h2>독두껍들을 클릭해서 잡아라!!!!!@</h2>
        <button class="menu-btn" id="start-btn">게임시작</button>
        <button class="menu-btn" id="collection-menu-btn">도감</button>
        <button class="menu-btn" id="how-to-play-btn">방법</button>
    </div>

    <div id="collection-modal">
        <div id="collection-content">
            <h2>두껍 도감</h2>
            <div class="collection-grid" id="collection-grid"></div>
            <button class="close-btn" id="close-collection">닫기</button>
        </div>
    </div>

    <div id="game-over">
        <h1>두껍에게 당했습니다...</h1>
        <div id="final-stats"></div>
        <button class="game-over-btn" id="restart-btn">다시시작</button>
        <button class="game-over-btn" id="collection-gameover-btn">도감</button>
        <button class="game-over-btn" id="main-menu-btn">메뉴</button>
    </div>

            score: 0,
            lives: 3,
            combo: 0,
            active: false,
            paused: false,

            lastHitTime: 0,

            ddungbo: {

            sinsa: {

                lifespan: 2700,
                points: 35,
                size: 58,
                maxSize: 310,
                spawnChance: 0.08,

        let spawnInterval, difficultyInterval, gameTimeInterval;
        const scoreLogElement = document.getElementById('score-log');
        const MAX_LOG_ENTRIES = 40;

        function formatLogTime(timestamp = Date.now()) {
            if (!state.startTime) return '00:00';
            const elapsed = Math.max(0, timestamp - state.startTime);
            const totalSeconds = Math.floor(elapsed / 1000);
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function renderScoreLog() {
            if (!scoreLogElement) return;
            scoreLogElement.innerHTML = '';
            state.scoreLog.forEach(entry => {
                const wrapper = document.createElement('div');
                wrapper.className = `log-entry${entry.highlight ? ' highlight' : ''}`;

                const timeSpan = document.createElement('span');
                timeSpan.className = 'timestamp';
                timeSpan.textContent = entry.time;

                const messageSpan = document.createElement('span');
                messageSpan.textContent = entry.message;

                wrapper.appendChild(timeSpan);
                wrapper.appendChild(messageSpan);
                scoreLogElement.appendChild(wrapper);
            });

            scoreLogElement.scrollTop = scoreLogElement.scrollHeight;
        }

        function logScore(message, options = {}) {
            const timestamp = formatLogTime();
            state.scoreLog.push({
                time: timestamp,
                message,
                highlight: Boolean(options.highlight)
            });

            if (state.scoreLog.length > MAX_LOG_ENTRIES) {
                state.scoreLog.splice(0, state.scoreLog.length - MAX_LOG_ENTRIES);
            }

            renderScoreLog();
        }

        function updateUI() {
            document.getElementById('score').textContent = state.score;
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((heart, i) => {
                heart.classList.toggle('lost', i >= state.lives);
            });
            
            // 콤보 표시 업데이트
            const comboDisplay = document.getElementById('combo-display');
            const comboCount = document.getElementById('combo-count');
            comboCount.textContent = state.combo;
            
            if (state.combo > 1) {
                comboDisplay.classList.add('active');
            } else {
                comboDisplay.classList.remove('active');
            }
            
            // 난이도 표시 업데이트
            document.getElementById('difficulty-display').textContent = `난이도: ${state.difficultyNames[state.difficultyLevel]}`;
        }

        function createBloodParticles(x, y, count = 30) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'blood-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = (Math.PI * 2 * i) / count;
                const speed = 3 + Math.random() * 5;
                const distance = 80 + Math.random() * 120;
                
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                document.body.appendChild(particle);
                
                let px = x, py = y;
                let frame = 0;
                const maxFrames = 40;
                
                function animateParticle() {
                    if (frame >= maxFrames) {
                        particle.remove();
                        return;
                    }
                    
                    px += vx;
                    py += vy + frame * 0.2;
                    
                    particle.style.left = px + 'px';
                    particle.style.top = py + 'px';
                    particle.style.opacity = 1 - (frame / maxFrames);
                    
                    frame++;
                    requestAnimationFrame(animateParticle);
                }
                
                animateParticle();
            }
        }

        function screenShake() {
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 500);
        }

        function showScorePopup(x, y, points, color = '#fff') {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.color = color;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function damageFlash() {
            const flash = document.getElementById('damage-flash');
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 300);
        }

        function createSpecialEffect(x, y, type) {
            const effect = document.createElement('div');
            effect.className = 'special-effect';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            
            if (type === 'hypnotize') {
                effect.style.width = '200px';
                effect.style.height = '200px';
                effect.style.border = '5px solid #FFD700';
                effect.style.borderRadius = '50%';
                effect.style.boxShadow = '0 0 30px #FFD700';
                effect.style.animation = 'hypnotize 1s forwards';
                
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
            }
            // 다른 효과들도 추가 가능
        }

        function spawnBoss() {
            if (state.bossActive) return;
            
            state.bossActive = true;
            state.bossHP = 15 + state.difficultyLevel * 5;
            state.maxBossHP = state.bossHP;
            
            const bossData = frogTypes.boss;
            const frog = document.createElement('div');
            frog.className = 'frog boss';
            
            const video = document.createElement('video');
            video.src = bossData.video;
            video.autoplay = true;
            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            frog.appendChild(video);
            document.body.appendChild(frog);
            
            state.bossFrog = frog;
            state.frogs.add(frog);
            state.discovered.add('boss');
            
            document.getElementById('boss-hp-container').classList.add('active');
            updateBossHP();
            logScore(`보스 등장! ${bossData.name} (HP ${state.bossHP})`, { highlight: true });
            
            let x = window.innerWidth / 2;
            let y = window.innerHeight / 2;
            let size = bossData.size;
            const maxSize = bossData.maxSize;
            let destroyed = false;
            let startTime = Date.now();
            let moveAngle = Math.random() * Math.PI * 2;
            let changeDirectionTime = Date.now();
            let lastAttackTime = Date.now();
            
            function animate() {
                if (destroyed || !state.active || state.paused) return;
                
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / 5000, 1);
                size = bossData.size + Math.pow(progress, 1.5) * (maxSize - bossData.size);
                
                if (Date.now() - changeDirectionTime > 1500) {
                    moveAngle = Math.random() * Math.PI * 2;
                    changeDirectionTime = Date.now();
                }
                
                x += Math.cos(moveAngle) * (2 + state.difficultyLevel * 0.5);
                y += Math.sin(moveAngle) * (2 + state.difficultyLevel * 0.5);
                
                x = Math.max(size / 2, Math.min(window.innerWidth - size / 2, x));
                y = Math.max(size / 2, Math.min(window.innerHeight - size / 2, y));
                
                frog.style.left = (x - size / 2) + 'px';
                frog.style.top = (y - size / 2) + 'px';
                frog.style.width = size + 'px';
                frog.style.height = size + 'px';
                
                // 보스 공격 패턴
                if (Date.now() - lastAttackTime > 3000) {
                    lastAttackTime = Date.now();
                    // 보스가 공격할 때 추가 효과
                    createSpecialEffect(x, y, 'hypnotize');
                }
                
                if (Math.random() < 0.005 && state.bossHP < state.maxBossHP) {
                    state.bossHP = Math.min(state.maxBossHP, state.bossHP + 1);
                    updateBossHP();
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            frog.addEventListener('click', (e) => {
                if (destroyed || !state.active || state.paused) return;
                e.stopPropagation();
                
                // 효과음 재생
                hitSound.currentTime = 0;
                hitSound.play().catch(e => console.log("오디오 재생 오류:", e));
                
                state.bossHP--;
                updateBossHP();
                logScore(`보스 타격! 남은 체력 ${Math.max(state.bossHP, 0)}`, { highlight: true });
                createBloodParticles(x, y, 20);
                screenShake();
                
                const damage = 50;
                state.score += damage;
                updateUI();
                showScorePopup(x, y, damage, '#ff00ff');
                
                if (state.bossHP <= 0) {
                    destroyed = true;
                    state.bossActive = false;
                    state.bossFrog = null;
                    
                    createBloodParticles(x, y, 60);
                    screenShake();
                    
                    state.score += bossData.points;
                    updateUI();
                    showScorePopup(x, y, bossData.points, '#FFD700');
                    logScore(`${bossData.name} 격파! 추가 점수 +${bossData.points}`, { highlight: true });

                    frog.remove();
                    state.frogs.delete(frog);
                    document.getElementById('boss-hp-container').classList.remove('active');
                }
            });
        }

        function updateBossHP() {
            const percent = (state.bossHP / state.maxBossHP) * 100;
            document.getElementById('boss-hp-fill').style.width = percent + '%';
        }

        function spawnFrog() {
            if (!state.active || state.paused) return;
            
            const rand = Math.random();
            let cumulativeChance = 0;
            let selectedType = 'chingu';
            
            for (const [key, data] of Object.entries(frogTypes)) {
                if (key === 'boss') {
                    if (rand < 0.002 && !state.bossActive && state.score > 1000) {
                        spawnBoss();
                        return;
                    }
                    continue;
                }
                
                cumulativeChance += data.spawnChance;
                if (rand < cumulativeChance) {
                    selectedType = key;
                    break;
                }
            }
            
            const frogData = frogTypes[selectedType];
            const frog = document.createElement('div');
            frog.className = 'frog';
            frog.dataset.type = selectedType;

            const video = document.createElement('video');
            video.src = frogData.video;
            video.autoplay = true;
            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            video.style.borderColor = frogData.color;
            frog.appendChild(video);

            const isShiny = Math.random() < state.shinyChance;
            frog.dataset.shiny = isShiny;
            if (isShiny) {
                frog.classList.add('shiny');
                logScore(`${frogData.name}의 이로치독두껍 출현!`, { highlight: true });
            }

            document.body.appendChild(frog);
            state.frogs.add(frog);
            state.discovered.add(selectedType);

            const safeMarginX = Math.max(frogData.maxSize / 2 + 20, 120);
            const safeMarginY = Math.max(frogData.maxSize / 2 + 20, 120);
            const clampX = (value) => {
                if (window.innerWidth <= safeMarginX * 2) {
                    return window.innerWidth / 2;
                }
                return Math.min(Math.max(value, safeMarginX), window.innerWidth - safeMarginX);
            };
            const clampY = (value) => {
                if (window.innerHeight <= safeMarginY * 2) {
                    return window.innerHeight / 2;
                }
                return Math.min(Math.max(value, safeMarginY), window.innerHeight - safeMarginY);
            };
            const randomX = () => clampX(safeMarginX + Math.random() * Math.max(0, window.innerWidth - safeMarginX * 2));
            const randomY = () => clampY(safeMarginY + Math.random() * Math.max(0, window.innerHeight - safeMarginY * 2));

            const side = Math.floor(Math.random() * 4);
            let startX, startY;

            if (side === 0) {
                startX = clampX(safeMarginX);
                startY = randomY();
            } else if (side === 1) {
                startX = clampX(window.innerWidth - safeMarginX);
                startY = randomY();
            } else if (side === 2) {
                startX = randomX();
                startY = clampY(safeMarginY);
            } else {
                startX = randomX();
                startY = clampY(window.innerHeight - safeMarginY);
            }

            const targetX = randomX();
            const targetY = randomY();

            let size = frogData.size;
            let currentX = startX;
            let currentY = startY;
            let destroyed = false;
            let startTime = Date.now();
            let lastTeleport = startTime;
            let flexTime = 0;
            let growFactor = 1;
            let rushSpeed = 0;

            function animate() {
                if (destroyed || !state.active || state.paused) return;

                const elapsed = Date.now() - startTime;
                const adjustedLifespan = Math.max(800, frogData.lifespan - state.difficultyLevel * 200);
                const progress = Math.min(elapsed / adjustedLifespan, 1);

                let easeProgress = 1 - Math.pow(1 - progress, 3);

                if (frogData.behavior === 'rush') {
                    if (rushSpeed === 0) rushSpeed = 5 + Math.random() * 3;
                    easeProgress = 1 - Math.pow(1 - progress, 5);
                } else if (frogData.behavior === 'aggressive') {
                    easeProgress = 1 - Math.pow(1 - progress, 4);
                }

                let nextX = startX + (targetX - startX) * easeProgress;
                let nextY = startY + (targetY - startY) * easeProgress;

                frog.style.animation = '';

                switch (frogData.behavior) {
                    case 'teleport': {
                        const canTeleport = Date.now() - lastTeleport > 400 && Math.random() < (frogData.teleportChance || 0.25);
                        if (canTeleport) {
                            nextX = clampX(currentX + (Math.random() - 0.5) * 280);
                            nextY = clampY(currentY + (Math.random() - 0.5) * 280);
                            frog.style.animation = 'teleport 0.2s';
                            lastTeleport = Date.now();
                            setTimeout(() => frog.style.animation = '', 200);
                        }
                        break;
                    }
                    case 'dance':
                        nextX += Math.sin(elapsed / 200) * 50;
                        frog.style.animation = 'dance 0.5s infinite';
                        break;
                    case 'flex':
                        flexTime += 0.1;
                        nextX += Math.sin(flexTime) * 30;
                        frog.style.animation = 'flex 0.5s infinite';
                        break;
                    case 'growFast':
                        growFactor = 1 + progress * 2;
                        break;
                    case 'hypnotize':
                        if (Math.random() < 0.01) {
                            createSpecialEffect(currentX, currentY, 'hypnotize');
                        }
                        break;
                    default:
                        break;
                }

                nextX = clampX(nextX);
                nextY = clampY(nextY);

                currentX = nextX;
                currentY = nextY;

                size = frogData.size + Math.pow(progress, 2) * (frogData.maxSize - frogData.size);
                size *= growFactor;
                if (isShiny) {
                    size *= 1.05;
                }

                frog.style.left = (currentX - size / 2) + 'px';
                frog.style.top = (currentY - size / 2) + 'px';
                frog.style.width = size + 'px';
                frog.style.height = size + 'px';

                if (progress >= 1) {
                    destroyed = true;
                    frog.remove();
                    state.frogs.delete(frog);
                    loseLife();
                    return;
                }

                requestAnimationFrame(animate);
            }

            animate();

            frog.addEventListener('click', (e) => {
                if (destroyed || !state.active || state.paused) return;
                destroyed = true;
                e.stopPropagation();

                // 효과음 재생
                hitSound.currentTime = 0;
                hitSound.play().catch(err => console.log("오디오 재생 오류:", err));

                createBloodParticles(currentX, currentY, isShiny ? 45 : 30);
                screenShake();

                const now = Date.now();
                if (now - state.lastHitTime < 1200) {
                    state.combo++;
                } else {
                    state.combo = 1;
                }
                state.lastHitTime = now;

                const basePoints = isShiny ? Math.floor(frogData.points * 2) : frogData.points;
                const comboMultiplier = 1 + Math.min(state.combo * 0.15, 2);
                const earnedPoints = Math.floor(basePoints * comboMultiplier);

                state.score += earnedPoints;
                updateUI();

                const popupColor = isShiny ? '#ffeb3b' : frogData.color;
                showScorePopup(currentX, currentY, earnedPoints, popupColor);

                const comboText = state.combo > 1 ? ` (콤보 x${state.combo})` : '';
                logScore(`${frogData.name}${isShiny ? ' (이로치)' : ''} 격파! +${earnedPoints}점${comboText}`, {
                    highlight: isShiny || state.combo > 1
                });

                frog.remove();
                state.frogs.delete(frog);
            });
        }

        function loseLife() {
            state.lives--;
            state.combo = 0;
            updateUI();
            logScore(`생명 감소! 남은 목숨: ${Math.max(state.lives, 0)}`, { highlight: true });

            // 피격음 재생
            damageSound.currentTime = 0;
            damageSound.play().catch(e => console.log("오디오 재생 오류:", e));
            
            damageFlash();
            screenShake();
            
            if (state.lives <= 0) {
                gameOver();
            }
        }

        function increaseDifficulty() {
            if (!state.active || state.spawnDelay <= state.minSpawnDelay || state.paused) return;
            const previousLevel = state.difficultyLevel;
            state.spawnDelay = Math.max(state.minSpawnDelay, state.spawnDelay - 30);
            state.difficultyLevel = Math.min(4, Math.floor((800 - state.spawnDelay) / 100));

            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnFrog, state.spawnDelay);

            updateUI();

            if (state.difficultyLevel !== previousLevel) {
                logScore(`난이도 상승! 현재 난이도: ${state.difficultyNames[state.difficultyLevel]}`, { highlight: true });
            }
        }

        function updateGameTime() {
            if (!state.active || state.paused) return;
            state.gameTime = Date.now() - state.startTime;
        }

        function gameOver() {
            state.active = false;
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);
            clearInterval(gameTimeInterval);
            
            state.frogs.forEach(frog => frog.remove());
            state.frogs.clear();
            
            const elapsed = (state.gameTime / 1000).toFixed(1);
            document.getElementById('final-stats').innerHTML = `
                최종 점수: <strong>${state.score}</strong><br>
                생존 시간: <strong>${elapsed}초</strong><br>
                발견한 독두껍: <strong>${state.discovered.size}/15</strong><br>
                최종 난이도: <strong>${state.difficultyNames[state.difficultyLevel]}</strong>
            `;

            document.getElementById('game-over').classList.add('active');
            logScore(`게임 종료! 최종 점수 ${state.score}점`, { highlight: true });
        }

        function startGame() {
            state.score = 0;
            state.lives = 3;
            state.combo = 0;
            state.active = true;
            state.paused = false;
            state.startTime = Date.now();
            state.lastHitTime = 0;
            state.spawnDelay = 800;
            state.bossActive = false;
            state.bossHP = 0;
            state.bossFrog = null;
            state.frogs.clear();
            state.gameTime = 0;
            state.difficultyLevel = 0;
            state.scoreLog = [];

            renderScoreLog();
            logScore('게임 시작!', { highlight: true });

            updateUI();
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-over').classList.remove('active');
            document.getElementById('boss-hp-container').classList.remove('active');
            document.getElementById('pause-screen').classList.remove('active');
            
            spawnInterval = setInterval(spawnFrog, state.spawnDelay);
            difficultyInterval = setInterval(increaseDifficulty, 2500);
            gameTimeInterval = setInterval(updateGameTime, 1000);
        }

        function togglePause() {
            if (!state.active) return;
            
            state.paused = !state.paused;
            
            if (state.paused) {
                document.getElementById('pause-screen').classList.add('active');
            } else {
                document.getElementById('pause-screen').classList.remove('active');
            }
        }

        function showMainMenu() {
            state.active = false;
            state.paused = false;
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);
            clearInterval(gameTimeInterval);
            
            state.frogs.forEach(frog => frog.remove());
            state.frogs.clear();
            
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-over').classList.remove('active');
            document.getElementById('collection-modal').classList.remove('active');
            document.getElementById('pause-screen').classList.remove('active');
        }

        function updateCollection() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            
            for (const [key, data] of Object.entries(frogTypes)) {
                const item = document.createElement('div');
                item.className = 'collection-item';
                item.style.setProperty('--item-color', data.color);
                
                if (state.discovered.has(key)) {
                    item.classList.add('discovered');
                    item.innerHTML = `
                        <h3>${data.name}</h3>
                        <p>${data.description}</p>
                        <div class="collection-stats">
                            점수: ${data.points} | 수명: ${(data.lifespan/1000).toFixed(1)}초
                        </div>
                    `;
                } else {
                    item.classList.add('locked');
                    item.innerHTML = `
                        <h3>???</h3>
                        <p>아직 발견하지 못한 독두껍</p>
                    `;
                }
                
                grid.appendChild(item);
            }
        }

        // 이벤트 리스너 설정
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('collection-menu-btn').addEventListener('click', () => {
            updateCollection();
            document.getElementById('collection-modal').classList.add('active');
        });
        document.getElementById('how-to-play-btn').addEventListener('click', () => {
            alert("조랄두껍잡기");
        });

        document.getElementById('close-collection').addEventListener('click', () => {
            document.getElementById('collection-modal').classList.remove('active');
        });

        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('collection-gameover-btn').addEventListener('click', () => {
            updateCollection();
            document.getElementById('collection-modal').classList.add('active');
        });
        document.getElementById('main-menu-btn').addEventListener('click', showMainMenu);

        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('resume-btn').addEventListener('click', togglePause);
        document.getElementById('pause-collection-btn').addEventListener('click', () => {
            updateCollection();
            document.getElementById('collection-modal').classList.add('active');
        });
        document.getElementById('pause-main-menu-btn').addEventListener('click', showMainMenu);

        // 게임 시작 시 메인 메뉴 표시
        showMainMenu();
    </script>
</body>
</html>
